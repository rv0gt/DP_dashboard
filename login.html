<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trading Portal</title>
    <link rel="stylesheet" href="./shared/css/common.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: var(--color-bg);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }
        .login-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 40px 36px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-blue-dark) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        .login-header p {
            font-size: 14px;
            color: var(--color-text-muted);
        }
        .login-field {
            margin-bottom: 20px;
        }
        .login-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }
        .login-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 14px;
            font-family: var(--font-family);
            color: var(--color-text);
            background: var(--color-surface-alt);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--color-blue);
            box-shadow: 0 0 0 3px rgba(37, 152, 195, 0.15);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-blue-dark) 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-family);
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-error {
            display: none;
            background: var(--color-negative-bg);
            color: var(--color-negative);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
        .login-error.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                        <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
                    </svg>
                </div>
                <h1>Trading Portal</h1>
                <p>Bitte anmelden um fortzufahren</p>
            </div>

            <div class="login-error" id="login-error">
                Benutzername oder Passwort falsch.
            </div>

            <form id="login-form">
                <div class="login-field">
                    <label for="username">Benutzername</label>
                    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="login-field">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Anmelden</button>
            </form>
        </div>
    </div>

<script>
    // Auth-Server URL (FastAPI auf demselben Server)
    var AUTH_URL = window.location.protocol + '//' + window.location.hostname + ':8081';

    // Falls bereits eingeloggt → direkt weiterleiten
    var token = localStorage.getItem('portal_token');
    if (token) {
        fetch(AUTH_URL + '/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.valid) window.location.href = 'home.html';
        })
        .catch(function() {});
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();

        var btn = document.getElementById('login-btn');
        var errorEl = document.getElementById('login-error');
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        errorEl.classList.remove('visible');
        btn.disabled = true;
        btn.textContent = 'Wird geprüft...';

        fetch(AUTH_URL + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, password: password })
        })
        .then(function(r) {
            if (!r.ok) throw new Error('Login fehlgeschlagen');
            return r.json();
        })
        .then(function(data) {
            localStorage.setItem('portal_token', data.token);
            localStorage.setItem('portal_user', data.username);
            window.location.href = 'home.html';
        })
        .catch(function() {
            errorEl.classList.add('visible');
            btn.disabled = false;
            btn.textContent = 'Anmelden';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        });
    });
</script>
</body>
</html>
